<svg xmlns="http://www.w3.org/2000/svg" style="filter: grayscale(1);" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400&display=swap');
    </style>
    <filter id="greyscale">
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="white" opacity="0"/>

  <!-- Outer border frame -->
  <rect x="16" y="16" width="768" height="528" rx="1" fill="none" stroke="#B89F7E" stroke-width="1.2"/>
  <!-- Inner border frame -->
  <rect x="24" y="24" width="752" height="512" rx="1" fill="none" stroke="#B89F7E" stroke-width="0.4" opacity="0.5"/>

  <!-- Subtle nautical grid (very faint) -->
  <g opacity="0.08" stroke="#B89F7E" stroke-width="0.4">
    <line x1="24" y1="80" x2="776" y2="80"/>
    <line x1="24" y1="136" x2="776" y2="136"/>
    <line x1="24" y1="192" x2="776" y2="192"/>
    <line x1="24" y1="248" x2="776" y2="248"/>
    <line x1="24" y1="304" x2="776" y2="304"/>
    <line x1="24" y1="360" x2="776" y2="360"/>
    <line x1="24" y1="416" x2="776" y2="416"/>
    <line x1="24" y1="472" x2="776" y2="472"/>
    <line x1="80" y1="24" x2="80" y2="536"/>
    <line x1="160" y1="24" x2="160" y2="536"/>
    <line x1="240" y1="24" x2="240" y2="536"/>
    <line x1="320" y1="24" x2="320" y2="536"/>
    <line x1="400" y1="24" x2="400" y2="536"/>
    <line x1="480" y1="24" x2="480" y2="536"/>
    <line x1="560" y1="24" x2="560" y2="536"/>
    <line x1="640" y1="24" x2="640" y2="536"/>
    <line x1="720" y1="24" x2="720" y2="536"/>
  </g>

  <!-- Diagonal nautical lines (very faint) -->
  <g opacity="0.05" stroke="#B89F7E" stroke-width="0.5">
    <line x1="24" y1="24" x2="776" y2="536"/>
    <line x1="776" y1="24" x2="24" y2="536"/>
    <line x1="400" y1="24" x2="776" y2="536"/>
    <line x1="400" y1="24" x2="24" y2="536"/>
  </g>

  <!-- Corner ornaments -->
  <!-- Top-left -->
  <g stroke="#B89F7E" stroke-width="0.6" opacity="0.6">
    <line x1="32" y1="44" x2="52" y2="44"/>
    <line x1="44" y1="32" x2="44" y2="52"/>
    <circle cx="44" cy="44" r="2" fill="#B89F7E" opacity="0.4"/>
  </g>
  <!-- Top-right -->
  <g stroke="#B89F7E" stroke-width="0.6" opacity="0.6">
    <line x1="748" y1="44" x2="768" y2="44"/>
    <line x1="756" y1="32" x2="756" y2="52"/>
    <circle cx="756" cy="44" r="2" fill="#B89F7E" opacity="0.4"/>
  </g>
  <!-- Bottom-left -->
  <g stroke="#B89F7E" stroke-width="0.6" opacity="0.6">
    <line x1="32" y1="516" x2="52" y2="516"/>
    <line x1="44" y1="508" x2="44" y2="528"/>
    <circle cx="44" cy="516" r="2" fill="#B89F7E" opacity="0.4"/>
  </g>
  <!-- Bottom-right -->
  <g stroke="#B89F7E" stroke-width="0.6" opacity="0.6">
    <line x1="748" y1="516" x2="768" y2="516"/>
    <line x1="756" y1="508" x2="756" y2="528"/>
    <circle cx="756" cy="516" r="2" fill="#B89F7E" opacity="0.4"/>
  </g>

  <!-- Sello institucional - centered -->
  <!-- Outer decorative ring -->
  <circle cx="400" cy="252" r="118" fill="none" stroke="#B89F7E" stroke-width="0.4" opacity="0.3"/>
  <!-- Main circle -->
  <circle cx="400" cy="252" r="110" fill="none" stroke="#C8A96E" stroke-width="1.4"/>
  <!-- Inner ring -->
  <circle cx="400" cy="252" r="104" fill="none" stroke="#C8A96E" stroke-width="0.4" opacity="0.6"/>
  <!-- Dashed ring -->
  <circle cx="400" cy="252" r="96" fill="none" stroke="#B89F7E" stroke-width="0.7" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- Main number 1512 -->
  <text x="400" y="242"
    text-anchor="middle"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="52" font-weight="600"
    fill="#C8A96E" letter-spacing="2">1512</text>

  <!-- CLUB PRIVADO -->
  <text x="400" y="265"
    text-anchor="middle"
    font-family="Jost, sans-serif"
    font-size="11" font-weight="300"
    fill="#7A7A72" letter-spacing="5">CLUB PRIVADO</text>

  <!-- DE INVERSIÓN -->
  <text x="400" y="281"
    text-anchor="middle"
    font-family="Jost, sans-serif"
    font-size="11" font-weight="300"
    fill="#7A7A72" letter-spacing="5">DE INVERSIÓN</text>

  <!-- Thin separator line -->
  <line x1="342" y1="294" x2="458" y2="294" stroke="#5C4A32" stroke-width="0.5" opacity="0.8"/>

  <!-- Ornamental dots flanking bottom text -->
  <circle cx="344" cy="308" r="1.2" fill="#B89F7E" opacity="0.6"/>
  <circle cx="456" cy="308" r="1.2" fill="#B89F7E" opacity="0.6"/>

  <!-- MADRID · MMXXVI -->
  <text x="400" y="312"
    text-anchor="middle"
    font-family="Jost, sans-serif"
    font-size="10" font-weight="200"
    fill="#555550" letter-spacing="5">MADRID · MMXXVI</text>

  <!-- Motto bottom -->
  <text x="400" y="490"
    text-anchor="middle"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="15" font-weight="300"
    fill="#B89F7E" letter-spacing="2"
    font-style="italic">Primus in Novo Mundo</text>

  <!-- Small ornamental line above motto -->
  <line x1="320" y1="480" x2="480" y2="480" stroke="#5C4A32" stroke-width="0.4" opacity="0.6"/>
</svg>
